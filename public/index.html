<!DOCTYPE html>
<html>
<head>
    <title>Facebook BNZAI Bot v2024</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background: #0f0f23; color: white; }
        .card { background: #1a1a2e; padding: 20px; border-radius: 10px; margin: 10px 0; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        input, select, button { padding: 12px; border: none; border-radius: 6px; font-size: 16px; margin: 5px; width: 100%; box-sizing: border-box; }
        button { background: #00d4aa; color: white; cursor: pointer; font-weight: bold; transition: all 0.3s; }
        button:hover { background: #00b894; transform: translateY(-2px); }
        button:disabled { background: #666; cursor: not-allowed; }
        .status { padding: 10px; border-radius: 6px; margin: 10px 0; }
        .success { background: #00b894; }
        .error { background: #e74c3c; }
        .live { background: #f39c12; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
        .progress { background: #333; height: 20px; border-radius: 10px; overflow: hidden; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #00d4aa, #00b894); transition: width 0.3s; }
    </style>
</head>
<body>
    <h1>🚀 Facebook BNZAI Bot v2024 (99% Success)</h1>
    
    <div class="card">
        <h3>🎯 Start Bot</h3>
        <input id="cookie" placeholder="Paste your FULL Facebook cookie here (with c_user)" />
        <input id="url" placeholder="Post URL (facebook.com/...)"/>
        <input id="amount" type="number" placeholder="Amount (1-100)" />
        <input id="interval" type="number" placeholder="Interval seconds (3-30)" />
        <select id="type">
            <option value="react">React 👍</option>
            <option value="share">Share 📤</option>
        </select>
        <select id="reaction">
            <option value="like">Like 👍</option>
            <option value="love">Love ❤️</option>
            <option value="wow">Wow 😮</option>
            <option value="haha">Haha 😂</option>
            <option value="sad">Sad 😢</option>
        </select>
        <button onclick="startBot()">🚀 START BNZAI BOT</button>
        <div id="status"></div>
    </div>

    <div class="card">
        <h3>📊 Live Sessions</h3>
        <button onclick="refreshSessions()">🔄 Refresh</button>
        <div id="sessions"></div>
    </div>

    <script>
        async function startBot() {
            const data = {
                cookie: document.getElementById('cookie').value,
                url: document.getElementById('url').value,
                amount: document.getElementById('amount').value,
                interval: document.getElementById('interval').value,
                type: document.getElementById('type').value,
                reaction: document.getElementById('reaction').value
            };

            const status = document.getElementById('status');
            status.className = 'status';
            status.innerHTML = '🚀 Starting...';

            try {
                const res = await fetch('/api/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();

                if (result.success) {
                    status.className = 'status success';
                    status.innerHTML = `✅ ${result.message} | Session: ${result.sessionId}`;
                    refreshSessions();
                } else {
                    status.className = 'status error';
                    status.innerHTML = `❌ ${result.error}`;
                }
            } catch (e) {
                status.className = 'status error';
                status.innerHTML = `❌ Network error: ${e.message}`;
            }
        }

        async function refreshSessions() {
            const res = await fetch('/total');
            const sessions = await res.json();
            const container = document.getElementById('sessions');
            
            if (sessions.length === 0) {
                container.innerHTML = '<p>No active sessions</p>';
                return;
            }

            container.innerHTML = `
                <table>
                    <tr><th>Session</th><th>Post</th><th>Progress</th><th>Status</th><th>Actions</th></tr>
                    ${sessions.map(s => `
                        <tr>
                            <td>${s.id.slice(-8)}</td>
                            <td>${s.postId.slice(0, 12)}...</td>
                            <td>
                                <div class="progress"><div class="progress-bar" style="width: ${s.count/s.target*100}%"></div></div>
                                ${s.count}/${s.target}
                            </td>
                            <td>
                                ${s.error ? `<span style="color:#e74c3c">${s.error}</span>` : 
                                  s.paused ? '⏸️ Paused' : '🟢 Live'}
                            </td>
                            <td>
                                <button onclick="togglePause('${s.id}')" style="padding:5px 10px;font-size:12px;">
                                    ${s.paused ? '▶️ Resume' : '⏸️ Pause'}
                                </button>
                                <button onclick="deleteSession('${s.id}')" style="background:#e74c3c;padding:5px 10px;font-size:12px;">🗑️</button>
                            </td>
                        </tr>
                    `).join('')}
                </table>
            `;
        }

        async function togglePause(sessionId) {
            await fetch(`/api/pause/${sessionId}`, { method: 'POST' });
            refreshSessions();
        }

        async function deleteSession(sessionId) {
            await fetch(`/api/delete/${sessionId}`, { method: 'DELETE' });
            refreshSessions();
        }

        // Auto refresh
        setInterval(refreshSessions, 3000);
        refreshSessions();
    </script>
</body>
</html>
